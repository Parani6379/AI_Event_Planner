{% extends "customer/base.html" %}
{% block title %}Register — Event Planner Pro{% endblock %}

{% block content %}

<section class="min-h-screen bg-gradient-to-br from-purple-50 via-white to-pink-50 flex items-center py-16">
    <div class="max-w-md mx-auto px-4 w-full">

        <!-- Card -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">

            <!-- Header -->
            <div class="bg-gradient-to-r from-pink-500 to-purple-600 p-8 text-center">
                <div class="w-16 h-16 bg-white bg-opacity-20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-plus text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-black text-white">Create Account</h1>
                <p class="text-pink-100 text-sm mt-1">Join us to book your dream event</p>
            </div>

            <div class="p-8">

                <!-- Alerts -->
                <div id="error-alert"
                     class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-5 flex items-center gap-2 text-sm">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-msg"></span>
                </div>

                <div id="success-alert"
                     class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-5 flex items-center gap-2 text-sm">
                    <i class="fas fa-check-circle"></i>
                    <span id="success-msg"></span>
                </div>

                <!-- Register Form -->
                <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4">

                    <!-- Full Name -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name *</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="text" id="full-name" required
                                   placeholder="Your full name"
                                   class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-purple-400">
                        </div>
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Phone Number *</label>
                        <div class="relative">
                            <i class="fas fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="tel" id="phone" required
                                   placeholder="10-digit mobile number"
                                   class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-purple-400">
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address *</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="email" id="reg-email" required
                                   placeholder="your@email.com"
                                   class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-purple-400">
                        </div>
                    </div>

                    <!-- Address -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Address</label>
                        <div class="relative">
                            <i class="fas fa-map-marker-alt absolute left-3 top-3 text-gray-400 text-sm"></i>
                            <textarea id="address" rows="2"
                                      placeholder="Your address (optional)"
                                      class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-purple-400 resize-none"></textarea>
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Password *</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="password" id="reg-password" required
                                   placeholder="Min 6 characters"
                                   class="w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-purple-400">
                            <button type="button" onclick="togglePwd('reg-password', 'eye-pwd')"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i id="eye-pwd" class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                        <!-- Password Strength -->
                        <div id="pwd-strength" class="mt-2 hidden">
                            <div class="flex gap-1 mb-1">
                                <div class="h-1 flex-1 rounded-full bg-gray-200" id="str-1"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-200" id="str-2"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-200" id="str-3"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-200" id="str-4"></div>
                            </div>
                            <p class="text-xs text-gray-500" id="str-label">Enter password</p>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password *</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="password" id="confirm-pwd" required
                                   placeholder="Re-enter password"
                                   oninput="checkPasswordMatch()"
                                   class="w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-purple-400">
                            <span id="match-icon" class="absolute right-3 top-1/2 -translate-y-1/2 text-sm hidden"></span>
                        </div>
                    </div>

                    <!-- Terms -->
                    <div class="flex items-start gap-3">
                        <input type="checkbox" id="terms" required
                               class="w-4 h-4 mt-0.5 text-purple-600 rounded border-gray-300 cursor-pointer">
                        <label for="terms" class="text-xs text-gray-600 cursor-pointer">
                            I agree to the <span class="text-purple-600 font-medium">Terms of Service</span> and
                            <span class="text-purple-600 font-medium">Privacy Policy</span>
                        </label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="register-btn"
                            class="w-full py-3.5 bg-gradient-to-r from-pink-500 to-purple-600 text-white rounded-xl font-bold text-sm hover:opacity-90 transition-opacity">
                        <span id="btn-text">
                            <i class="fas fa-user-plus mr-2"></i>Create Account
                        </span>
                        <span id="btn-loading" class="hidden">
                            <i class="fas fa-spinner fa-spin mr-2"></i>Creating account...
                        </span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-3 my-5">
                    <div class="flex-1 h-px bg-gray-200"></div>
                    <span class="text-gray-400 text-xs">or</span>
                    <div class="flex-1 h-px bg-gray-200"></div>
                </div>

                <!-- Login Link -->
                <p class="text-center text-sm text-gray-500">
                    Already have an account?
                    <a href="/login" class="text-purple-600 font-bold hover:text-purple-800">
                        Sign in here
                    </a>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <p class="text-center mt-5">
            <a href="/" class="text-gray-500 text-sm hover:text-purple-600">
                <i class="fas fa-arrow-left mr-1"></i>Back to Home
            </a>
        </p>
    </div>
</section>

{% endblock %}

{% block scripts %}
<script>
// Redirect if already logged in
if (getCustomerToken()) {
    window.location.href = '/booking';
}

// ── Password Strength ─────────────────────────────────
document.getElementById('reg-password').addEventListener('input', function() {
    const val = this.value;
    const strength = document.getElementById('pwd-strength');
    strength.classList.remove('hidden');

    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9!@#$%]/.test(val)) score++;

    const colors = ['bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-green-500'];
    const labels = ['Too weak', 'Weak', 'Good', 'Strong'];

    for (let i = 1; i <= 4; i++) {
        const el = document.getElementById(`str-${i}`);
        el.className = `h-1 flex-1 rounded-full ${i <= score ? colors[score - 1] : 'bg-gray-200'}`;
    }
    document.getElementById('str-label').textContent =
        val ? labels[score - 1] || 'Enter password' : 'Enter password';
    document.getElementById('str-label').className =
        `text-xs ${score >= 3 ? 'text-green-600' : 'text-gray-500'}`;
});

function checkPasswordMatch() {
    const pwd = document.getElementById('reg-password').value;
    const confirm = document.getElementById('confirm-pwd').value;
    const icon = document.getElementById('match-icon');

    if (!confirm) {
        icon.classList.add('hidden');
        return;
    }

    icon.classList.remove('hidden');
    if (pwd === confirm) {
        icon.innerHTML = '<i class="fas fa-check-circle text-green-500"></i>';
    } else {
        icon.innerHTML = '<i class="fas fa-times-circle text-red-500"></i>';
    }
}

async function handleRegister(e) {
    e.preventDefault();

    const fullName = document.getElementById('full-name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const address = document.getElementById('address').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirmPwd = document.getElementById('confirm-pwd').value;

    const btnText = document.getElementById('btn-text');
    const btnLoading = document.getElementById('btn-loading');

    // Validation
    if (password !== confirmPwd) {
        showAlert('error', 'Passwords do not match.');
        return;
    }
    if (password.length < 6) {
        showAlert('error', 'Password must be at least 6 characters.');
        return;
    }
    if (phone.length < 10) {
        showAlert('error', 'Enter a valid phone number.');
        return;
    }

    btnText.classList.add('hidden');
    btnLoading.classList.remove('hidden');
    document.getElementById('error-alert').classList.add('hidden');

    try {
        const response = await fetch('/api/auth/customer/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                full_name: fullName,
                phone,
                email,
                password,
                address
            })
        });
        const data = await response.json();

        if (data.success) {
            showAlert('success', 'Account created! Redirecting to login...');
            setTimeout(() => window.location.href = '/login', 1500);
        } else {
            showAlert('error', data.message || 'Registration failed.');
        }

    } catch (err) {
        showAlert('error', 'Connection error. Please try again.');
    } finally {
        btnText.classList.remove('hidden');
        btnLoading.classList.add('hidden');
    }
}

function showAlert(type, msg) {
    const errEl = document.getElementById('error-alert');
    const sucEl = document.getElementById('success-alert');

    if (type === 'error') {
        document.getElementById('error-msg').textContent = msg;
        errEl.classList.remove('hidden');
        sucEl.classList.add('hidden');
    } else {
        document.getElementById('success-msg').textContent = msg;
        sucEl.classList.remove('hidden');
        errEl.classList.add('hidden');
    }
}

function togglePwd(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash text-sm';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye text-sm';
    }
}
</script>
{% endblock %}
