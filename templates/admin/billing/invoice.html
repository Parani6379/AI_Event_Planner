{% extends "admin/base.html" %}
{% block title %}Invoice{% endblock %}
{% block page_title %}Invoice View{% endblock %}
{% block page_subtitle %}Printable invoice{% endblock %}

{% block content %}

<div class="max-w-4xl mx-auto">

    <!-- Action Bar -->
    <div class="flex items-center justify-between mb-5 no-print">
        <a href="/admin/billing"
           class="flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 rounded-xl text-sm font-medium hover:bg-gray-200 transition-colors">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        <div class="flex gap-3">
            <button onclick="window.print()"
                    class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 transition-colors">
                <i class="fas fa-print"></i> Print
            </button>
            <button onclick="downloadPDF()"
                    id="pdf-btn"
                    class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-xl text-sm font-medium hover:bg-red-700 transition-colors">
                <i class="fas fa-file-pdf"></i> Download PDF
            </button>
        </div>
    </div>

    <!-- Invoice Card -->
    <div id="invoice-card" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <div class="text-center py-10 text-gray-400">
            <i class="fas fa-spinner fa-spin text-4xl"></i>
            <p class="mt-2">Loading invoice...</p>
        </div>
    </div>
</div>

<style>
@media print {
    .no-print { display: none !important; }
    body { background: white; }
    .rounded-2xl { border-radius: 0; }
    .shadow-sm { box-shadow: none; }
}
</style>

{% endblock %}

{% block scripts %}
<script>
const billingId = {{ billing_id }};

async function loadInvoice() {
    try {
        const data = await apiRequest(`/api/billing/${billingId}`);
        if (!data.success) {
            showToast('Invoice not found', 'error');
            return;
        }
        renderInvoice(data.data);
    } catch (e) {
        showToast('Failed to load invoice', 'error');
    }
}

async function downloadPDF() {
    const btn = document.getElementById('pdf-btn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
    btn.disabled = true;

    try {
        const token = getToken();
        const response = await fetch(`/api/billing/${billingId}/pdf`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
            const err = await response.json();
            showToast(err.message || 'PDF generation failed', 'error');
            return;
        }

        // Get filename from Content-Disposition or use fallback
        const disposition = response.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="?([^"]+)"?/);
        const filename = match ? match[1] : `invoice-${billingId}.pdf`;

        const blob = await response.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showToast('PDF downloaded!', 'success');
    } catch (e) {
        showToast('Download failed: ' + e.message, 'error');
    } finally {
        btn.innerHTML = '<i class="fas fa-file-pdf"></i> Download PDF';
        btn.disabled = false;
    }
}

function renderInvoice(b) {
    const card = document.getElementById('invoice-card');

    const statusColor = {
        'Paid': 'text-green-600 bg-green-100',
        'Partially Paid': 'text-orange-600 bg-orange-100',
        'Pending': 'text-red-600 bg-red-100'
    }[b.billing_status] || 'text-gray-600 bg-gray-100';

    card.innerHTML = `
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start mb-8 pb-6 border-b-2 border-purple-100">
            <div>
                <h1 class="text-3xl font-black text-purple-700">${b.business_name || 'Event Planner Pro'}</h1>
                <p class="text-gray-500 text-sm mt-1">Professional Event & Decoration Services</p>
                ${b.business_phone ? `<p class="text-gray-500 text-sm">${b.business_phone}</p>` : ''}
                ${b.business_address ? `<p class="text-gray-500 text-sm">${b.business_address}</p>` : ''}
            </div>
            <div class="text-right mt-4 md:mt-0">
                <span class="px-4 py-2 rounded-xl text-sm font-bold ${statusColor}">
                    ${b.billing_status}
                </span>
                <p class="text-2xl font-black text-gray-800 mt-2">INVOICE</p>
                <p class="text-purple-600 font-bold">${b.invoice_number}</p>
                <p class="text-gray-400 text-xs">Date: ${formatDate(b.created_at)}</p>
            </div>
        </div>

        <!-- Bill To & Event -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gray-50 rounded-xl p-4">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-3">Bill To</h3>
                <p class="font-bold text-gray-800">${b.customer_name}</p>
                <p class="text-gray-600 text-sm">${b.customer_phone}</p>
                <p class="text-gray-600 text-sm">${b.customer_email}</p>
                <p class="text-gray-600 text-sm">${b.customer_address}</p>
            </div>
            <div class="bg-purple-50 rounded-xl p-4">
                <h3 class="text-xs font-bold text-purple-600 uppercase mb-3">Event Details</h3>
                <p class="font-bold text-gray-800">${b.event_type}</p>
                <p class="text-gray-600 text-sm">Date: ${formatDate(b.event_date)}</p>
                <p class="text-gray-600 text-sm">Duration: ${b.event_duration} day(s)</p>
                <p class="text-gray-600 text-sm">Package: ${b.decoration_package || '—'}</p>
            </div>
        </div>

        <!-- Service Items -->
        ${b.items && b.items.length > 0 ? `
        <div class="mb-6">
            <h3 class="font-bold text-gray-700 mb-3">Service Charges</h3>
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-purple-600 text-white">
                        <th class="text-left px-4 py-3 rounded-l-lg">#</th>
                        <th class="text-left px-4 py-3">Service</th>
                        <th class="text-center px-4 py-3">Qty</th>
                        <th class="text-right px-4 py-3">Unit Price</th>
                        <th class="text-right px-4 py-3 rounded-r-lg">Total</th>
                    </tr>
                </thead>
                <tbody>
                    ${b.items.map((item, i) => `
                    <tr class="${i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}">
                        <td class="px-4 py-3">${i + 1}</td>
                        <td class="px-4 py-3 font-medium">${item.service_name}</td>
                        <td class="px-4 py-3 text-center">${item.quantity}</td>
                        <td class="px-4 py-3 text-right">₹${item.unit_price.toLocaleString('en-IN')}</td>
                        <td class="px-4 py-3 text-right font-semibold">₹${item.total_price.toLocaleString('en-IN')}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>` : ''}

        <!-- Labour & Materials -->
        <div class="mb-6">
            <h3 class="font-bold text-gray-700 mb-3">Labour & Material Costs</h3>
            <div class="bg-gray-50 rounded-xl overflow-hidden">
                ${[
                    [`Labour (${b.number_of_labours} × ₹${b.labour_daily_wage}/day × ${b.labour_days} days)`, b.total_labour_cost],
                    ['Flower Cost', b.flower_cost],
                    ['Cloth / Banner', b.cloth_banner_cost],
                    ['Electrical Materials', b.electrical_materials_cost],
                    ['Rental Items', b.rental_items_cost],
                    ['Other Materials', b.other_material_cost]
                ].filter(([,v]) => v > 0).map(([label, val], i) => `
                    <div class="flex justify-between px-4 py-3 ${i > 0 ? 'border-t border-gray-200' : ''}">
                        <span class="text-gray-700 text-sm">${label}</span>
                        <span class="font-semibold text-sm">₹${parseFloat(val).toLocaleString('en-IN')}</span>
                    </div>`).join('')}
            </div>
        </div>

        <!-- Payment Summary -->
        <div class="flex justify-end">
            <div class="w-full md:w-80">
                <div class="bg-gray-50 rounded-xl p-5 space-y-3 text-sm">
                    <div class="flex justify-between">
                        <span class="text-gray-600">Subtotal</span>
                        <span class="font-semibold">₹${b.subtotal.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                    </div>
                    ${b.discount > 0 ? `
                    <div class="flex justify-between">
                        <span class="text-gray-600">Discount</span>
                        <span class="font-semibold text-green-600">- ₹${b.discount.toLocaleString('en-IN')}</span>
                    </div>` : ''}
                    ${b.tax_rate > 0 ? `
                    <div class="flex justify-between">
                        <span class="text-gray-600">GST (${b.tax_rate}%)</span>
                        <span class="font-semibold">₹${b.tax_amount.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                    </div>` : ''}
                    <div class="flex justify-between border-t-2 border-purple-200 pt-3">
                        <span class="font-bold text-gray-800 text-base">Grand Total</span>
                        <span class="font-black text-purple-600 text-lg">₹${b.grand_total.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Advance Paid</span>
                        <span class="font-semibold text-blue-600">₹${b.advance_paid.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div class="flex justify-between border-t-2 border-red-200 pt-3">
                        <span class="font-bold text-red-600 text-base">Balance Due</span>
                        <span class="font-black text-red-600 text-lg">₹${b.pending_amount.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-3 text-center">
                    Payment Mode: <strong>${b.payment_mode}</strong>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm font-semibold text-purple-700">Thank you for choosing ${b.business_name || 'Event Planner Pro'}! 🌟</p>
            <p class="text-xs text-gray-400 mt-1">This is a computer-generated invoice.</p>
        </div>`;
}

document.addEventListener('DOMContentLoaded', loadInvoice);
</script>
{% endblock %}
